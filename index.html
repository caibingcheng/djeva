<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJEVA</title>

    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="stylesheet" href="lib/gridmanager.css">
    <link rel="stylesheet" href="lib/flatpickr.min.css">
    <script src="lib/gridmanager.js"></script>
</head>

<style>
    html,
    body {
        padding: 0 0;
        margin: 0 5px;
    }

    .eva_low {
        color: rgb(23, 195, 23);
    }

    .eva_mid {
        color: rgb(117, 119, 117);
    }

    .eva_high {
        color: rgb(173, 17, 17);
    }

    .code_link {
        text-decoration: none;
        color: black;
        font-weight: bolder;
    }

    .date-picker-wrapper {
        display: inline-flex;
        align-items: center;
        background: #e8e8e8;
        border: 2px solid #e8e8e8;
        border-radius: 6px;
        overflow: hidden;
        vertical-align: middle;
    }

    #date_picker {
        color: black;
        font-size: 16px;
        background: transparent;
        border: none;
        padding: 4px 10px;
        text-align: center;
        cursor: pointer;
        outline: none;
        width: 120px;
    }

    #btn_latest {
        color: black;
        font-size: 16px;
        background: transparent;
        border: none;
        border-left: 1px solid #ccc;
        padding: 4px 10px;
        cursor: pointer;
        outline: none;
    }
    #btn_latest:hover {
        background-color: #008CBA;
        color: white;
    }

    .flatpickr-day.selected,
    .flatpickr-day.startRange,
    .flatpickr-day.endRange {
        background: #008CBA;
        border-color: #008CBA;
    }

    .flatpickr-day.selected:hover,
    .flatpickr-day.startRange:hover,
    .flatpickr-day.endRange:hover {
        background: #0077a3;
        border-color: #0077a3;
    }

    .comment {
        color: #7a7a7a;
        font-size: 0.8rem;
        padding: 0 0;
        margin: 0 0;
    }

    header {
        line-height: 48px;
        width: 100%;
        padding: 0 0;
        margin: 0 0;
    }

    main {
        height: 100%;
    }

    footer {
        position: fixed;
        bottom: 0;
        line-height: 32px;
        width: 100%;
        padding: 0 0;
        margin: 0 0;
    }
</style>

<body>
    <header>
        <div class="date-picker-wrapper">
            <input type="text" id="date_picker" placeholder="选择日期" readonly>
            <button id="btn_latest">最新</button>
        </div>
        <span id="trading_week"></span>
    </header>
    <main>
        <table></table>
    </main>
    <footer>
        <p class="comment">重要提示：投资有风险，估值数据仅供参考，不构成任何投资建议。</p>
    </footer>

    <script type="text/javascript" src="djeva.js"></script>
    <script src="lib/flatpickr.min.js"></script>
    <script src="lib/flatpickr.zh.js"></script>
    <script>
        var djeva = get_djeva();
        let week_obj = document.querySelector("#trading_week");

        function sortByKey(arr, key = "") {
            if (typeof (arr) == "string")
                arr = JSON.parse(arr);
            return arr.sort(function (a, b) {
                if (key == "")
                    return a - b;
                return a[key] - b[key];
            });
        }

        // 构建可用日期数组
        let availableDates = [];
        for (let year in djeva.data) {
            for (let month in djeva.data[year]) {
                for (let day of djeva.data[year][month]) {
                    availableDates.push(year + '-' + month + '-' + day);
                }
            }
        }
        availableDates = sortByKey(availableDates);
        let latestDate = availableDates[availableDates.length - 1];

        function onDateChange(dateStr) {
            let parts = dateStr.split('-');
            let year = parseInt(parts[0]);
            let month = parseInt(parts[1]);
            let day = parseInt(parts[2]);
            let date = new Date(year, month - 1, day);
            let week = {
                0: "星期天",
                1: "星期一",
                2: "星期二",
                3: "星期三",
                4: "星期四",
                5: "星期五",
                6: "星期六",
            };
            week_obj.innerHTML = ' · ' + week[date.getDay()];
            query(dateStr);
        }

        flatpickr.localize(flatpickr.l10ns.zh);
        flatpickr("#date_picker", {
            enable: availableDates,
            dateFormat: "Y-m-d",
            defaultDate: latestDate,
            onChange: function (selectedDates, dateStr) {
                onDateChange(dateStr);
            }
        });

        document.querySelector("#btn_latest").onclick = function() {
            let fp = document.querySelector("#date_picker")._flatpickr;
            fp.setDate(latestDate);
            onDateChange(latestDate);
        };

        // 初始化加载最新数据
        onDateChange(latestDate);

        function sortingData(data, query) {
            let sortProps = "DESC";
            let sortOrder = "";
            Object.keys(query).forEach((key) => {
                if (query[key] === "ASC" || query[key] === "DESC") {
                    sortProps = key.split("_")[1];
                    sortOrder = query[key];
                }
            });

            return ((list, sortProps, sortOrder) => {
                if (sortOrder === "ASC") {
                    return sortByKey(list, sortProps);
                }
                if (sortOrder === "DESC") {
                    return sortByKey(list, sortProps).reverse();
                }
                return list;
            })(data, sortProps, sortOrder);
        }

        function getDJEvaList(params, url) {
            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                xhr.open('GET', url);
                xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
                xhr.onreadystatechange = function () {
                    if (xhr.readyState !== 4) {
                        return;
                    }
                    if (xhr.status >= 200 && xhr.status < 300 || xhr.status === 304) {
                        resolve(sortingData(xhr.response, params));
                    } else {
                        reject(xhr);
                    }
                };

                xhr.send();
            });
        };

        function query(date) {
            document.querySelector('table').GM({
                gridManagerName: 'djeva',
                ajaxData: function (settings, params) {
                    return getDJEvaList(params, 'json/' + date + '.json');
                },
                responseHandler: function (response) {
                    document.title = 'DJEVA ' + response[0]['date'];
                    response = {
                        'data': response,
                        'totals': response.length
                    };

                    return response;
                },
                supportCheckbox: false,
                supportAutoOrder: false,
                supportDrag: false,
                pageSizeKey: 'totals',
                height: '100vh - 80px',
                columnData: [
                    {
                        key: 'index_code',
                        text: '代码',
                        template: function (cell, row, index, key) {
                            let link = 'https://danjuanapp.com/dj-valuation-table-detail/' + cell;
                            let content = row['name'] + ' (' + cell + ')';
                            return '<a class="code_link" href="' + link + '">' + content + '</a>';
                        },
                        sorting: '',
                    }, {
                        key: 'eva_type',
                        text: '估值',
                        template: function (cell, row, index, key) {
                            eva_type = {
                                'low': '<span class="eva_low">偏低</span>',
                                'mid': '<span class="eva_mid">适中</span>',
                                'high': '<span class="eva_high">偏高</span>',
                                'unsort': '',
                            };
                            return eva_type[cell];
                        },
                        sorting: '',
                    }, {
                        key: 'pe',
                        text: 'PE',
                        sorting: '',
                    }, {
                        key: 'pe_percentile',
                        text: 'PE百分位',
                        template: function (cell, row, index, key) {
                            return (cell * 100).toFixed(2) + '%';
                        },
                        sorting: '',
                    }, {
                        key: 'pb',
                        text: 'PB',
                        sorting: '',
                    }, {
                        key: 'pb_percentile',
                        text: 'PB百分位',
                        template: function (cell, row, index, key) {
                            return (cell * 100).toFixed(2) + '%';
                        },
                        sorting: '',
                    }, {
                        key: 'roe',
                        text: 'ROE',
                        template: function (cell, row, index, key) {
                            return (cell * 100).toFixed(2) + '%';
                        },
                        sorting: '',
                    }, {
                        key: 'yeild',
                        text: '股息率',
                        template: function (cell, row, index, key) {
                            return (cell * 100).toFixed(2) + '%';
                        },
                        sorting: '',
                    }, {
                        key: 'peg',
                        text: '预测PEG',
                        sorting: '',
                    },
                ]
            });
        }
    </script>

</body>

</html>
